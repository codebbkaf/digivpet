name: DigiVPet

options:
  bundleIdPrefix: com.digivpet
  createIntermediateGroups: true
  deploymentTarget:
    watchOS: "10.0"

targets:
  DigiVPet:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      # Sources/Complication is the widget extension's own code (it declares its own @main) and
      # must NOT be compiled into the app, or the app would have two entry points.
      - path: Sources
        excludes:
          - "Complication/**"
      # The evolution graph ships as data so adding a Digimon needs no code change.
      # See docs/evolutions-schema.md for the file format.
      - path: Resources
        buildPhase: resources
      # Folder reference (type: folder), NOT an asset catalog — stage subfolders are
      # preserved so sheets stay addressable by path at runtime. sprites_cut/ is dev-tool
      # output and is deliberately not listed here.
      - path: "16x16 Digimon Sprites"
        type: folder
        buildPhase: resources
    info:
      path: Support/Info.plist
      properties:
        CFBundleDisplayName: DigiVPet
        WKApplication: true
        # Required to INSTALL, not just build: without it the installer demands a
        # WKCompanionAppBundleIdentifier. There is no iPhone companion by design.
        WKWatchOnly: true
        NSHealthShareUsageDescription: >-
          DigiVPet reads your steps, active energy, sleep and exercise minutes to
          feed and grow your Digimon. Your health data never leaves this watch.
        # What a complication tap opens (`DigiVPetURL`). Without this the scheme is unclaimed and
        # the tap opens nothing at all — it builds fine, so only tapping catches it.
        CFBundleURLTypes:
          - CFBundleURLName: com.digivpet.DigiVPet
            CFBundleURLSchemes: [digivpet]
    # Generated by xcodegen, like Info.plist — edit here, never the .entitlements directly.
    # Without com.apple.developer.healthkit, requestAuthorization FAILS at runtime; it builds
    # fine, so only launching the app catches its absence. `access` is empty because the app
    # reads no clinical records, and there is no share entitlement because it never writes.
    entitlements:
      path: Support/DigiVPet.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        # US-033's observers. Without it `enableBackgroundDelivery` FAILS with "Missing
        # com.apple.developer.healthkit.background-delivery entitlement" — it builds and launches
        # fine, so only reading the log of a running app catches its absence, exactly as US-001
        # missed WKWatchOnly. The observer queries themselves still work; what is lost without this
        # is the wake, which is the entire point of observing.
        com.apple.developer.healthkit.background-delivery: true
        # The only channel between the app and its widget: they are separate processes with
        # separate containers, so without this shared group the app publishes its
        # `ComplicationSnapshot` nowhere and the complication draws the placeholder forever.
        # Must match `ComplicationSnapshotStore.appGroup` and the extension's copy below.
        com.apple.security.application-groups: [group.com.digivpet.DigiVPet]
    dependencies:
      # Embeds the extension in the app bundle. A widget extension that is built but not embedded
      # never appears in the complication gallery.
      - target: DigiVPetComplicationExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digivpet.DigiVPet
        # Set HERE, not in the Xcode UI: `xcodegen generate` regenerates the .xcodeproj every
        # Ralph iteration and discards anything the UI wrote, so a team picked in Signing &
        # Capabilities silently reverts and device builds fail with "requires a development team".
        DEVELOPMENT_TEAM: S8YH22BDWN
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: 4
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO
        # Names the app icon set inside Resources/Assets.xcassets. Without this the catalog still
        # compiles and the build still succeeds — the app just installs with the blank placeholder
        # icon, so only looking at the watch face catches it.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - DigiVPetTests

  DigiVPetComplicationExtension:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Sources/Complication
      # Shared with the app by COMPILING THE SAME FILES rather than by a framework: four small
      # self-contained files (no SwiftData, no evolution graph) do not justify a dynamic framework
      # that both processes would have to load.
      - path: Sources/ComplicationSnapshot.swift
      - path: Sources/ComplicationViews.swift
      - path: Sources/SpriteLoader.swift
      - path: Sources/SpriteSheet.swift
      - path: Sources/IdleSpriteCache.swift
      # The extension has its OWN bundle, so `Bundle.main` here is the extension's — the sprites
      # must be bundled a second time or `SpriteLoader` finds nothing and every complication draws
      # the '?' placeholder.
      - path: "16x16 Digimon Sprites"
        type: folder
        buildPhase: resources
    info:
      path: Support/Complication-Info.plist
      properties:
        CFBundleDisplayName: Digimon
        NSExtension:
          # This one key is what makes the bundle a WidgetKit extension. Get it wrong and it builds,
          # installs, and simply never appears in the gallery.
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Support/DigiVPetComplication.entitlements
      properties:
        com.apple.security.application-groups: [group.com.digivpet.DigiVPet]
    settings:
      base:
        # Must be prefixed with the app's id: watchOS rejects an extension whose bundle id is not
        # underneath its container app's.
        PRODUCT_BUNDLE_IDENTIFIER: com.digivpet.DigiVPet.Widget
        DEVELOPMENT_TEAM: S8YH22BDWN
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        TARGETED_DEVICE_FAMILY: 4
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: NO

  DigiVPetTests:
    type: bundle.unit-test
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Tests
    dependencies:
      - target: DigiVPet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digivpet.DigiVPetTests
        DEVELOPMENT_TEAM: S8YH22BDWN
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DigiVPet.app/DigiVPet"
        BUNDLE_LOADER: "$(TEST_HOST)"
